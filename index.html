              slot.prescription = getPeriodizedPrescription({
                block: slot.label,
                exercise: slot.exercise,
                prescription: slot.basePrescription || slot.prescription
              }, phase);
            });
          }
          saveState();
          renderApp();
          switchTab(TABS.OPTIONS);
        });
      });
    }

    function handleReset() {
      const confirmed = window.confirm("Are you sure you want to reset all progress, loads, nudges, rotations, and history?");
      if (!confirmed) {
        return;
      }
      state = createDefaultState();
      saveState();
      renderApp();
      switchTab(TABS.TODAY);
    }

    function updateHero() {
      if (isTodayClosed()) {
        const periodization = getPeriodizationPhase();
        document.getElementById("heroDayPill").textContent = "Finished - Today";
        document.getElementById("heroModePill").textContent = periodization.label;
        document.getElementById("heroProgressPill").textContent = state.trainingSessionsCompleted + " sessions completed";
        return;
      }

      const plan = getTodayPlan();
      const periodization = state.currentWorkout && state.currentWorkout.periodization
        ? state.currentWorkout.periodization
        : getPeriodizationPhase();
      const heroLabel = plan.pendingCheckin
        ? "Recovery start"
        : (SESSION_LABELS[plan.effectiveSessionType] || plan.title);
      const heroDetail = plan.pendingCheckin
        ? (SESSION_LABELS[plan.baseSessionType] || "Session")
        : (plan.band.label + " - " + plan.total + "/15");
      document.getElementById("heroDayPill").textContent = heroLabel + " - " + heroDetail;
      document.getElementById("heroModePill").textContent = periodization.label;
      document.getElementById("heroProgressPill").textContent = state.trainingSessionsCompleted + " sessions completed";
    }

    function switchTab(tabName) {
      activeTab = tabName;
      document.querySelectorAll(".tab-button").forEach((button) => {
        button.classList.toggle("active", button.getAttribute("data-tab") === tabName);
      });
      document.querySelectorAll(".view").forEach((view) => {
        const targetId = tabName === TABS.TODAY
          ? "todayView"
          : "optionsView";
        view.classList.toggle("active", view.id === targetId);
      });
    }

    function renderApp() {
      syncTimerState();
      updateHero();
      renderToday();
      renderOptions();
      switchTab(activeTab || TABS.TODAY);
      updateTimerDisplay();
    }

    function launchConfetti() {
      const layer = document.getElementById("confettiLayer");
      layer.innerHTML = "";
      const colors = ["#ff5a00", "#ff9a45", "#8d8d8d", "#f1ece4", "#5a1f0b"];

      for (let index = 0; index < 70; index += 1) {
        const piece = document.createElement("span");
        piece.className = "confetti-piece";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[index % colors.length];
        piece.style.animationDuration = 2200 + Math.random() * 1800 + "ms";
        piece.style.animationDelay = Math.random() * 120 + "ms";
        piece.style.setProperty("--drift", (Math.random() * 38 - 19).toFixed(2) + "vw");
        piece.style.setProperty("--spin", Math.round(Math.random() * 800 - 400) + "deg");
        layer.appendChild(piece);
      }

      window.setTimeout(() => {
        layer.innerHTML = "";
      }, 4200);
    }

    document.querySelectorAll(".tab-button").forEach((button) => {
      button.addEventListener("click", () => {
        switchTab(button.getAttribute("data-tab"));
      });
    });

    document.addEventListener("visibilitychange", () => {
      syncTimerState();
      updateTimerDisplay();
      updateWakeLock();
    });

    let deferredInstallPrompt = null;
    const installPanel = document.getElementById("installPanel");
    const installButton = document.getElementById("installButton");
    const pwaStatus = document.getElementById("pwaStatus");
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;

    if (isStandalone) {
      pwaStatus.textContent = "Installed";
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      installPanel.classList.add("visible");
      pwaStatus.textContent = "Install ready";
    });

    installButton.addEventListener("click", async () => {
      if (!deferredInstallPrompt) {
        return;
      }
      deferredInstallPrompt.prompt();
      const choice = await deferredInstallPrompt.userChoice;
      if (choice.outcome === "accepted") {
        installPanel.classList.remove("visible");
        pwaStatus.textContent = "Installed";
      }
      deferredInstallPrompt = null;
    });

    window.addEventListener("appinstalled", () => {
      installPanel.classList.remove("visible");
      deferredInstallPrompt = null;
      pwaStatus.textContent = "Installed";
    });

    if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then(() => {
            if (!isStandalone) {
              pwaStatus.textContent = "Ready offline";
            }
          })
          .catch(() => {
            pwaStatus.textContent = "Online mode";
          });
      });
    } else if (window.location.protocol === "file:") {
      pwaStatus.textContent = "Preview mode";
    }

    renderApp();
    switchTab(TABS.TODAY);
    startTimerLoop();
  </script>
</body>
</html>
