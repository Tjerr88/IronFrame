<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Iron Frame: athletic kettlebell hypertrophy, conditioning en recovery in één installeerbare trainingsapp.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Iron Frame">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <title>Iron Frame | Athletic Kettlebell Hypertrophy</title>
  <style>
    :root {
      --bg: #080808;
      --bg-accent: #121212;
      --surface: rgba(20, 20, 20, 0.94);
      --surface-strong: #1b1b1b;
      --surface-soft: #202020;
      --text: #f1ece4;
      --muted: #b5aea3;
      --line: rgba(255, 126, 32, 0.18);
      --line-strong: rgba(255, 126, 32, 0.34);
      --shadow: 0 28px 64px rgba(0, 0, 0, 0.44);
      --shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.30);
      --primary: #ff7a1a;
      --primary-strong: #ff5a00;
      --primary-soft: rgba(255, 106, 0, 0.14);
      --success: #81c784;
      --warning: #ffb74d;
      --danger: #ff8a80;
      --accent-metal: #70685e;
      --font-body: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --font-display: "Rockwell", "Arial Black", "Aptos", serif;
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --max-width: 980px;
      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(255, 90, 0, 0.18), transparent 20%),
        radial-gradient(circle at 20% 80%, rgba(255, 140, 0, 0.10), transparent 24%),
        linear-gradient(180deg, #050505 0%, #111111 48%, var(--bg) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), transparent 24%),
        radial-gradient(circle at 50% 0%, rgba(255,120,20,0.08), transparent 18%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.016) 0 1px, transparent 1px 24px);
      opacity: 1;
    }

    .app-shell {
      position: relative;
      width: min(calc(100% - 28px), var(--max-width));
      margin: 28px auto 48px;
      z-index: 1;
    }

    .hero {
      display: block;
      width: 100%;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 90, 0, 0.18), transparent 24%),
        linear-gradient(180deg, rgba(26, 26, 26, 0.98), rgba(10, 10, 10, 0.98));
      border: 1px solid rgba(255, 110, 32, 0.20);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px 18px 16px;
      backdrop-filter: blur(10px);
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 12px;
      height: 10px;
      border-top: 1px solid rgba(255, 120, 32, 0.35);
      border-bottom: 1px solid rgba(255, 120, 32, 0.12);
      opacity: 0.9;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 106, 0, 0.12);
      color: #ffd8ba;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      border: 1px solid rgba(255, 120, 32, 0.24);
    }

    h1 {
      margin: 18px 0 10px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(1.9rem, 4vw, 3rem);
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: #f6eee4;
    }

    .hero p {
      margin: 0;
      max-width: 60ch;
      color: var(--muted);
      line-height: 1.7;
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 0;
    }

    .pill {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(28, 28, 28, 0.94);
      border: 1px solid var(--line);
      font-size: 0.88rem;
      color: var(--text);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 18px;
      padding: 7px;
      border-radius: 24px;
      background: rgba(18, 18, 18, 0.92);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(8px);
    }

    .tab-button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 15px 16px;
      background: transparent;
      color: var(--muted);
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), transform var(--transition);
    }

    .tab-button.active {
      background: linear-gradient(135deg, #ff8b26, var(--primary-strong));
      color: #130a05;
      box-shadow: 0 12px 26px rgba(255, 90, 0, 0.22);
    }

    .tab-button:active,
    .primary-button:active,
    .secondary-button:active,
    .nudge-button:active {
      transform: translateY(1px) scale(0.99);
    }

    .view {
      display: none;
      margin-top: 18px;
      animation: fadeIn 240ms ease;
    }

    .view.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(255, 126, 32, 0.12);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 22px;
      backdrop-filter: blur(10px);
    }

    .card.soft {
      background: rgba(24, 24, 24, 0.92);
    }

    .focus-card {
      position: relative;
      border-color: rgba(255, 110, 32, 0.24);
      background:
        linear-gradient(180deg, rgba(24, 24, 24, 0.98), rgba(12, 12, 12, 0.98));
    }

    .focus-card::before {
      content: "";
      display: block;
      width: 108px;
      height: 8px;
      margin-bottom: 10px;
      border-top: 1px solid rgba(255, 110, 32, 0.38);
      border-bottom: 1px solid rgba(255, 110, 32, 0.18);
    }

    .focus-card h3 {
      margin-top: 6px;
      margin-bottom: 8px;
      font-family: var(--font-display);
      font-size: 1.45rem;
      color: #fff3e7;
    }

    .focus-card .subtle {
      max-width: 70ch;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .card h2,
    .card h3,
    .card h4 {
      margin: 0;
      letter-spacing: -0.02em;
      font-family: var(--font-display);
      font-weight: 700;
    }

    .subtle {
      color: var(--muted);
      line-height: 1.55;
    }

    .day-banner {
      display: grid;
      gap: 14px;
    }

    .day-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 106, 0, 0.12);
      color: #ffd0ad;
      border: 1px solid rgba(255, 126, 32, 0.20);
    }

    .slot-grid {
      display: grid;
      gap: 14px;
    }

    .group-grid {
      display: grid;
      gap: 16px;
    }

    .exercise-group {
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid rgba(255, 126, 32, 0.16);
      border-radius: 22px;
      background: rgba(14, 14, 14, 0.78);
    }

    .group-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .group-heading h4 {
      margin: 0;
      font-size: 1.08rem;
    }

    .group-slots {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .slot-card {
      background: linear-gradient(180deg, rgba(34, 34, 34, 0.98), rgba(18, 18, 18, 0.98));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }

    .slot-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.38);
      border-color: rgba(255, 126, 32, 0.32);
    }

    .slot-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .slot-kicker {
      margin: 0 0 6px;
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #d1c3b6;
    }

    .slot-title {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.25;
    }

    .slot-chip {
      flex-shrink: 0;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(255, 106, 0, 0.12);
      border: 1px solid var(--line);
      font-weight: 700;
      font-size: 0.88rem;
      color: #ffb47b;
    }

    .exercise-name {
      margin: 3px 0 0;
      font-size: 1.02rem;
      font-weight: 700;
      color: var(--text);
    }

    .nudge-line {
      margin: 10px 0 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 106, 0, 0.10);
      color: #ffd0ad;
      font-size: 0.92rem;
    }

    .slot-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
    }

    .set-tracker {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
    }

    .set-stepper {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .stepper-button {
      min-width: 52px;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      font-weight: 800;
    }

    .input-wrap {
      display: grid;
      gap: 8px;
    }

    .input-label {
      font-size: 0.9rem;
      color: #d1c3b6;
      font-weight: 600;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      padding: 14px 15px;
      font-size: 1rem;
      color: var(--text);
      background: #111111;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: rgba(255, 126, 32, 0.58);
      box-shadow: 0 0 0 4px rgba(255, 106, 0, 0.12);
    }

    .nudge-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nudge-button,
    .primary-button,
    .secondary-button,
    .ghost-button {
      appearance: none;
      border: 0;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition), border-color var(--transition);
    }

    .nudge-button {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: #242424;
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.24);
    }

    .nudge-button.active-up {
      background: rgba(63, 143, 101, 0.14);
      border-color: rgba(63, 143, 101, 0.35);
      color: var(--success);
    }

    .nudge-button.active-down {
      background: rgba(184, 92, 92, 0.14);
      border-color: rgba(184, 92, 92, 0.32);
      color: var(--danger);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .primary-button,
    .secondary-button,
    .ghost-button {
      min-height: 52px;
      border-radius: 18px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
    }

    .primary-button:disabled,
    .secondary-button:disabled,
    .ghost-button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
      transform: none;
      box-shadow: none;
    }

    .primary-button {
      background: linear-gradient(135deg, #ff8b26, var(--primary-strong));
      color: #160b04;
      box-shadow: 0 16px 24px rgba(255, 90, 0, 0.20);
    }

    .secondary-button {
      background: #282828;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.22);
    }

    .ghost-button {
      background: rgba(173, 90, 90, 0.10);
      color: var(--danger);
      border: 1px solid rgba(173, 90, 90, 0.16);
    }

    .today-empty {
      text-align: center;
      padding: 28px 20px;
    }

    .action-card {
      display: grid;
      gap: 16px;
      text-align: left;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top center, rgba(255, 94, 0, 0.14), transparent 28%),
        linear-gradient(180deg, rgba(24, 24, 24, 0.98), rgba(10, 10, 10, 0.98));
      border-color: rgba(255, 126, 32, 0.18);
    }

    .action-card::before {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      top: 14px;
      height: 8px;
      border-top: 1px solid rgba(255, 126, 32, 0.38);
      border-bottom: 1px solid rgba(255, 126, 32, 0.16);
      pointer-events: none;
    }

    .action-card > * {
      position: relative;
      z-index: 1;
    }

    .action-kicker {
      margin: 0 0 6px;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #ffb47b;
    }

    .action-card .card-header {
      margin-top: 10px;
    }

    .action-card h3 {
      color: #fff3e7;
      font-size: 1.45rem;
      text-shadow: 0 0 18px rgba(255, 96, 0, 0.12);
    }

    .action-card .subtle {
      color: #d6c7b8;
    }

    .action-value {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.04;
      color: #fff0e3;
    }

    .action-support {
      margin: -2px 0 0;
      font-size: 0.96rem;
      color: var(--muted);
    }

    .session-overview {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }

    .overview-card {
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(30, 30, 30, 0.94), rgba(18, 18, 18, 0.94));
      border: 1px solid rgba(255, 126, 32, 0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .overview-label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.77rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 800;
      color: #c6b8aa;
    }

    .overview-value {
      display: block;
      font-size: 1rem;
      line-height: 1.35;
      color: var(--text);
      font-weight: 700;
    }

    .stats-grid,
    .history-grid {
      display: grid;
      gap: 14px;
    }

    .stats-grid {
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    }

    .library-grid {
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .stat-card,
    .mini-card {
      padding: 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(31,31,31,0.98), rgba(18,18,18,0.96));
      border: 1px solid var(--line);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.22);
    }

    .stat-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.86rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 800;
    }

    .stat-value {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .mini-card h4 {
      margin-bottom: 8px;
      font-size: 1.02rem;
    }

    .recovery-slider-card {
      gap: 12px;
      background:
        radial-gradient(circle at top right, rgba(255, 94, 0, 0.10), transparent 34%),
        linear-gradient(180deg, rgba(35, 35, 35, 0.98), rgba(16, 16, 16, 0.96));
    }

    .recovery-slider-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .recovery-slider-head strong {
      font-size: 1rem;
      color: #fff1e6;
      letter-spacing: 0.01em;
    }

    .recovery-slider-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary-strong);
      letter-spacing: -0.03em;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--primary-strong);
    }

    .score-panel {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .score-panel .overview-value {
      font-size: 1.2rem;
    }

    .finished-card {
      text-align: center;
      justify-items: center;
      padding-top: 30px;
      padding-bottom: 28px;
    }

    .finished-mark {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2rem;
      color: #160b04;
      background: linear-gradient(135deg, #ff8b26, var(--primary-strong));
      box-shadow: 0 16px 30px rgba(255, 90, 0, 0.22);
    }

    .finished-card .action-value,
    .finished-card .action-support,
    .finished-card .subtle {
      text-align: center;
      max-width: 50ch;
    }

    .inline-list,
    .detail-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .inline-list li,
    .detail-list li {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
    }

    .inline-list li:last-child,
    .detail-list li:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .detail-list strong {
      color: var(--text);
    }

    .history-item {
      padding: 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(31,31,31,0.98), rgba(17,17,17,0.96));
      border: 1px solid var(--line);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.24);
    }

    .history-item h4 {
      margin-bottom: 10px;
    }

    .history-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 12px;
      line-height: 1.45;
    }

    .history-summary {
      color: var(--text);
      line-height: 1.55;
    }

    .history-item .day-badges {
      margin-bottom: 12px;
      gap: 8px;
    }

    .history-item .badge {
      padding: 7px 10px;
      font-size: 0.82rem;
    }

    .muted-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .accordion {
      overflow: hidden;
    }

    .accordion summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
    }

    .accordion summary::-webkit-details-marker {
      display: none;
    }

    .accordion summary::after {
      content: "+";
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255, 106, 0, 0.12);
      color: #ffb47b;
      font-size: 1.15rem;
      flex-shrink: 0;
      transition: transform var(--transition), background var(--transition);
    }

    .accordion[open] summary::after {
      transform: rotate(45deg);
      background: rgba(255, 106, 0, 0.20);
    }

    .accordion-body {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .timer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .timer-row.centered {
      justify-content: center;
      text-align: center;
    }

    .timer-row.centered .button-row,

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return createDefaultState();
        }
        const parsed = JSON.parse(raw);
        const merged = mergeWithDefaults(parsed);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
        return merged;
      } catch (error) {
        console.warn("Kon state niet laden, defaults worden gebruikt.", error);
        return createDefaultState();
      }
    }

    function mergeWithDefaults(saved) {
      const base = createDefaultState();
      const savedStrengthSessions = Number(saved.trainingSessionsCompleted) || 0;
      const savedPeriodizationMode = saved.periodization && ["auto", "hypertrophy", "strength"].includes(saved.periodization.mode)
        ? saved.periodization.mode
        : "auto";
      const merged = {
        ...base,
        appVersion: Number(saved.appVersion) || base.appVersion,
        trainingSessionsCompleted: savedStrengthSessions,
        periodization: {
          mode: savedPeriodizationMode,
          autoCompletedStrengthSessions: saved.periodization && Number.isFinite(Number(saved.periodization.autoCompletedStrengthSessions))
            ? Math.max(0, Number(saved.periodization.autoCompletedStrengthSessions))
            : savedStrengthSessions
        },
        recoveryCheckins: {
          ...base.recoveryCheckins,
          ...(saved.recoveryCheckins || {})
        },
        rotations: {
          mainOrderIndex: Number(saved.rotations && saved.rotations.mainOrderIndex) || 0,
          subcategories: {
            conditioningCycle: Number(saved.rotations && saved.rotations.subcategories && saved.rotations.subcategories.conditioningCycle) || 0,
            conditioningZone2Done: !!(saved.rotations && saved.rotations.subcategories && saved.rotations.subcategories.conditioningZone2Done),
            conditioningHiitDone: !!(saved.rotations && saved.rotations.subcategories && saved.rotations.subcategories.conditioningHiitDone)
          }
        },
        records: {
          ...base.records,
          ...(saved.records || {}),
          exercises: {
            ...base.records.exercises,
            ...((saved.records && saved.records.exercises) || {})
          }
        },
        timers: {
          ...base.timers,
          groupA: {
            ...base.timers.groupA,
            ...((saved.timers && saved.timers.groupA) || {})
          },
          groupB: {
            ...base.timers.groupB,
            ...((saved.timers && saved.timers.groupB) || {})
          },
          groupC: {
            ...base.timers.groupC,
            ...((saved.timers && saved.timers.groupC) || {})
          }
        },
        zone2: {
          ...base.zone2,
          ...(saved.zone2 || {})
        },
        hiit: {
          ...base.hiit,
          ...(saved.hiit || {}),
          weights: {
            ...base.hiit.weights,
            ...((saved.hiit && saved.hiit.weights) || {})
          },
          restDurations: {
            ...base.hiit.restDurations,
            ...((saved.hiit && saved.hiit.restDurations) || {})
          },
          timer: {
            ...base.hiit.timer,
            ...((saved.hiit && saved.hiit.timer) || {})
          }
        },
        history: Array.isArray(saved.history) ? saved.history : [],
        currentWorkout: saved.currentWorkout || null
      };
      if (saved.appVersion !== APP_VERSION) {
        if (merged.currentWorkout && merged.currentWorkout.rotationSnapshot) {
          merged.rotations = cloneRotations(merged.currentWorkout.rotationSnapshot);
        }
        merged.currentWorkout = null;
        merged.appVersion = APP_VERSION;
      }
      return merged;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function cloneRotations(rotations) {
      return JSON.parse(JSON.stringify(rotations || createDefaultState().rotations));
    }

    function shuffle(array) {
      const copy = Array.isArray(array) ? array.slice() : [];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    }

    function getTodayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return year + "-" + month + "-" + day;
    }

    function isValidFocusLesson(value) {
      return !!value
        && typeof value.title === "string"
        && value.title.trim()
        && typeof value.text === "string"
        && value.text.trim();
    }

    function loadFocusBag() {
      try {
        const raw = localStorage.getItem(LS_FOCUS_BAG_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) {
            const validLessons = parsed.filter(isValidFocusLesson);
            if (validLessons.length) {
              return validLessons;
            }
          }
        }
      } catch (error) {
        console.warn("Kon focus-bag niet laden, nieuwe bag wordt gemaakt.", error);
      }

      const freshBag = shuffle(IRON_FRAME_FOCUS_LESSONS);
      localStorage.setItem(LS_FOCUS_BAG_KEY, JSON.stringify(freshBag));
      return freshBag;
    }

    function drawFocus() {
      let bag = loadFocusBag();
      let previousFocus = null;

      try {
        const raw = localStorage.getItem(LS_FOCUS_TODAY_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (isValidFocusLesson(parsed)) {
            previousFocus = parsed;
          }
        }
      } catch (error) {
        console.warn("Kon vorige focus niet lezen.", error);
      }

      if (!bag.length) {
        bag = shuffle(IRON_FRAME_FOCUS_LESSONS);
      }

      if (
        previousFocus
        && bag.length > 1
        && bag[0]
        && bag[0].title === previousFocus.title
        && bag[0].text === previousFocus.text
      ) {
        const swapIndex = bag.findIndex((lesson) => lesson.title !== previousFocus.title || lesson.text !== previousFocus.text);
        if (swapIndex > 0) {
          [bag[0], bag[swapIndex]] = [bag[swapIndex], bag[0]];
        }
      }

      const focus = bag.shift() || IRON_FRAME_FOCUS_LESSONS[0];

      if (!bag.length) {
        bag = shuffle(IRON_FRAME_FOCUS_LESSONS);
        if (
          bag.length > 1
          && bag[0]
          && bag[0].title === focus.title
          && bag[0].text === focus.text
        ) {
          const swapIndex = bag.findIndex((lesson) => lesson.title !== focus.title || lesson.text !== focus.text);
          if (swapIndex > 0) {
            [bag[0], bag[swapIndex]] = [bag[swapIndex], bag[0]];
          }
        }
      }

      localStorage.setItem(LS_FOCUS_BAG_KEY, JSON.stringify(bag));
      return focus;
    }

    function getTodayFocus() {
      const today = getTodayKey();
      const cachedDay = localStorage.getItem(LS_FOCUS_DAY_KEY);

      if (cachedDay === today) {
        try {
          const raw = localStorage.getItem(LS_FOCUS_TODAY_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (isValidFocusLesson(parsed)) {
              return parsed;
            }
          }
        } catch (error) {
          console.warn("Kon focus van vandaag niet laden.", error);
        }
      }

      const focus = drawFocus();
      localStorage.setItem(LS_FOCUS_DAY_KEY, today);
      localStorage.setItem(LS_FOCUS_TODAY_KEY, JSON.stringify(focus));
      return focus;
    }

    function getSlotPrescription(slot) {
      return slot.prescription || "";
    }

    function getPeriodizationPhase() {
      const mode = state.periodization && state.periodization.mode ? state.periodization.mode : "auto";
      if (mode === "hypertrophy" || mode === "strength") {
        const phase = PERIODIZATION_PHASES.find((item) => item.key === mode);
        const heldSessions = Math.max(0, Number(state.trainingSessionsCompleted) || 0);
        const phaseSessionIndex = heldSessions % phase.sessionCount;
        return {
          ...phase,
          locked: true,
          cycleIndex: phaseSessionIndex,
          phaseSessionIndex,
          phaseSessionNumber: phaseSessionIndex + 1,
          cycleNumber: Math.floor(heldSessions / phase.sessionCount) + 1
        };
      }

      const completedStrengthSessions = state.periodization
        ? state.periodization.autoCompletedStrengthSessions
        : state.trainingSessionsCompleted;
      const cycleIndex = Math.max(0, Number(completedStrengthSessions) || 0) % PERIODIZATION_CYCLE_LENGTH;
      let cursor = 0;

      for (const phase of PERIODIZATION_PHASES) {
        const phaseEnd = cursor + phase.sessionCount;
        if (cycleIndex < phaseEnd) {
          return {
            ...phase,
            cycleIndex,
            phaseSessionIndex: cycleIndex - cursor,
            phaseSessionNumber: cycleIndex - cursor + 1,
            cycleNumber: Math.floor(Math.max(0, Number(completedStrengthSessions) || 0) / PERIODIZATION_CYCLE_LENGTH) + 1
          };
        }
        cursor = phaseEnd;
      }

      return { ...PERIODIZATION_PHASES[0], cycleIndex: 0, phaseSessionIndex: 0, phaseSessionNumber: 1, cycleNumber: 1 };
    }

    function getSideSuffix(prescription) {
      const match = String(prescription || "").match(/\s+(per\s+(?:kant|been))$/i);
      return match ? " " + match[1] : "";
    }

    function reduceToDeloadSets(prescription) {
      const value = String(prescription || "");
      return value.includes("x") ? value.replace(/^[^x]+x/, "1-2x") : value;
    }

    function getPeriodizedPrescription(template, phase) {
      const original = template.prescription || "";
      const phaseType = phase.type || phase.key;
      const sideSuffix = getSideSuffix(original);

      if (phaseType === "hypertrophy") {
        return original;
      }

      if (phaseType === "deload") {
        if (template.block === "Primer") {
          return "1 lichte ronde - " + original;
        }
        if (template.block === "A1") {
          return "2-3x6-8" + sideSuffix;
        }
        return reduceToDeloadSets(original);
      }

      if (template.block === "Primer") {
        return original;
      }
      if (template.block === "A1") {
        return "3-5x4-6" + sideSuffix;
      }
      if (template.block === "A2") {
        return "2-3x6-10" + sideSuffix;
      }
      if (template.block === "B1" || template.block === "B2") {
        return "2x8-10" + sideSuffix;
      }
      if (template.block === "C1") {
        return "2x8-12" + sideSuffix;
      }
      if (template.exercise === "Double clean" || template.exercise === "Cossack squat / side lunge") {
        return original;
      }
      return "2x10-15" + sideSuffix;
    }

    function createDefaultRecoveryCheckin() {
      return {
        energy: 3,
        body: 3,
        mind: 3,
        submittedAt: null
      };
    }

    function getTodayRecoveryCheckin() {
      return state.recoveryCheckins[getTodayKey()] || null;
    }

    function getRecoveryTotal(checkin) {
      return RECOVERY_FIELDS.reduce((sum, field) => sum + Number(checkin[field.key] || 0), 0);
    }

    function getRecoveryBand(total) {
      if (total <= RECOVERY_BANDS.override.max) {
        return RECOVERY_BANDS.override;
      }
      if (total <= RECOVERY_BANDS.low.max) {
        return RECOVERY_BANDS.low;
      }
      if (total <= RECOVERY_BANDS.medium.max) {
        return RECOVERY_BANDS.medium;
      }
      return RECOVERY_BANDS.high;
    }

    function getLocalDayStart(value) {
      const date = new Date(value);
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function getDaysSinceDate(value) {
      const msPerDay = 24 * 60 * 60 * 1000;
      const today = getLocalDayStart(new Date());
      const then = getLocalDayStart(value);
      return Math.floor((today - then) / msPerDay);
    }

    function getLastCompletedSessionByType(sessionType) {
      return state.history.find((item) => item.type !== "skip" && item.sessionType === sessionType) || null;
    }

    function isTrainingSessionType(sessionType) {
      return sessionType === "strength" || sessionType === "zone2" || sessionType === "hiit";
    }

    function isRecoverySessionType(sessionType) {
      return sessionType === "recovery" || sessionType === "breatheRest";
    }

    function hasTrainingOnDaysAgo(daysAgo) {
      return state.history.some((item) => item.type !== "skip" && isTrainingSessionType(item.sessionType) && getDaysSinceDate(item.completedAt) === daysAgo);
    }

    function getSessionLoggedDaysAgo(daysAgo) {
      return state.history.find((item) => item.type !== "skip" && getDaysSinceDate(item.completedAt) === daysAgo) || null;
    }

    function countTrainingDaysInLastDays(dayCount) {
      let count = 0;
      for (let daysAgo = 1; daysAgo <= dayCount; daysAgo += 1) {
        if (hasTrainingOnDaysAgo(daysAgo)) {
          count += 1;
        }
      }
      return count;
    }

    function getConsecutiveTrainingDaysEndingDaysAgo(endDaysAgo) {
      let count = 0;
      let cursor = endDaysAgo;

      while (hasTrainingOnDaysAgo(cursor)) {
        count += 1;
        cursor += 1;
      }

      return count;
    }

    function getCurrentTrainingBlockTarget() {
      const currentStreakLength = getConsecutiveTrainingDaysEndingDaysAgo(1);
      if (!currentStreakLength) {
        return 3;
      }

      const boundaryDaysAgo = currentStreakLength + 1;
      const boundarySession = getSessionLoggedDaysAgo(boundaryDaysAgo);

      if (!boundarySession || !isRecoverySessionType(boundarySession.sessionType)) {
        return 3;
      }

      const previousBlockLength = getConsecutiveTrainingDaysEndingDaysAgo(boundaryDaysAgo + 1);
      return previousBlockLength >= 3 ? 2 : 3;
    }

    function getBaseSessionTypeFromHistory() {
      const yesterdaySession = getSessionLoggedDaysAgo(1);
      const trainedYesterday = !!(yesterdaySession && isTrainingSessionType(yesterdaySession.sessionType));

      if (countTrainingDaysInLastDays(7) >= 5) {
        return "recovery";
      }

      if (!trainedYesterday) {
        return "strength";
      }

      const streakLength = getConsecutiveTrainingDaysEndingDaysAgo(1);
      const streakTarget = getCurrentTrainingBlockTarget();
      if (streakLength >= streakTarget) {
        return "recovery";
      }

      if (yesterdaySession.sessionType !== "strength") {
        return "strength";
      }

      const lastZone2 = getLastCompletedSessionByType("zone2");
      if (!lastZone2 || getDaysSinceDate(lastZone2.completedAt) > 7) {
        return "zone2";
      }

      const lastHiit = getLastCompletedSessionByType("hiit");
      if (!lastHiit || getDaysSinceDate(lastHiit.completedAt) > 7) {
        return "hiit";
      }

      return "recovery";
    }

    function getRecoveryDayDose(bandKey) {
      if (bandKey === "low") {
        return {
          title: "Breathe and Walk",
          summary: "Lowest recovery day.",
          guidance: [
            "Choose breathing, walking, or very light movement.",
            "You should finish more recovered than when you started."
          ]
        };
      }
      if (bandKey === "medium") {
        return {
          title: "General Mobility",
          summary: "Normal recovery day.",
          guidance: [
            "Use GFM or general mobility to restore motion and control.",
            "Stay calm, smooth and recovery-focused."
          ]
        };
      }
      return {
        title: "Loaded Kettlebell Mobility",
        summary: "High-recovery day.",
        guidance: [
          "Use the fixed 15-20 minute kettlebell mobility flow.",
          "Control under light load. Do not turn it into a workout."
        ]
      };
    }

    function getCurrentConditioningCycleIndex() {
      return Number(state.rotations.subcategories.conditioningCycle) || 0;
    }

    function getCurrentConditioningCycle() {
      const index = getCurrentConditioningCycleIndex();
      return CONDITIONING_CYCLES[index % CONDITIONING_CYCLES.length];
    }

    function getCurrentZone2Plan(bandKey) {
      const index = getCurrentConditioningCycleIndex();
      return {
        ...ZONE2_PLAN,
        cycleIndex: index % CONDITIONING_CYCLES.length,
        minutes: ZONE2_PLAN.duration[bandKey] || ZONE2_PLAN.duration.medium,
        selectedModality: ZONE2_PLAN.modalities.includes(state.zone2.modality)
          ? state.zone2.modality
          : ZONE2_PLAN.modalities[0]
      };
    }

    function getConditioningRoundTarget(rounds, bandKey) {
      return rounds[bandKey] || rounds.medium;
    }

    function completeConditioningType(type) {
      const subcategories = state.rotations.subcategories;
      if (type === "zone2") {
        subcategories.conditioningZone2Done = true;
      }
      if (type === "hiit") {
        subcategories.conditioningHiitDone = true;
      }
      if (subcategories.conditioningZone2Done && subcategories.conditioningHiitDone) {
        subcategories.conditioningCycle = getCurrentConditioningCycleIndex() + 1;
        subcategories.conditioningZone2Done = false;
        subcategories.conditioningHiitDone = false;
      }
    }

    function getTodayPlan() {
      const dateKey = getTodayKey();
      const checkin = getTodayRecoveryCheckin();
      const baseSessionType = getBaseSessionTypeFromHistory();
      if (!checkin || !checkin.submittedAt) {
        return {
          dateKey,
          pendingCheckin: true,
          baseSessionType
        };
      }

      const total = getRecoveryTotal(checkin);
      const band = getRecoveryBand(total);
      if (band.key === "override") {
        return {
          dateKey,
          checkin,
          total,
          band,
          baseSessionType,
          effectiveSessionType: "breatheRest",
          title: "Breathe & Rest",
          subtitle: "Below 8, recovery always wins.",
          summary: "Today, recovery is the training."
        };
      }

      if (baseSessionType === "strength") {
        return {
          dateKey,
          checkin,
          total,
          band,
          baseSessionType,
          effectiveSessionType: "strength",
          title: "Iron Frame",
          subtitle: "Fixed strength session.",
          summary: "Continue with the next strength day in the program."
        };
      }

      if (baseSessionType === "zone2") {
        const conditioningPlan = getCurrentZone2Plan(band.key);
        return {
          dateKey,
          checkin,
          total,
          band,
          baseSessionType,
          effectiveSessionType: "zone2",
          title: conditioningPlan.selectedModality,
          subtitle: conditioningPlan.minutes + " minutes",
          summary: conditioningPlan.goal,
          zone2Minutes: conditioningPlan.minutes,
          conditioningPlan
        };
      }

      if (baseSessionType === "hiit") {
        const conditioningPlan = getCurrentConditioningCycle().hiit;
        const hiitSets = conditioningPlan.sets;
        return {
          dateKey,
          checkin,
          total,
          band,
          baseSessionType,
          effectiveSessionType: "hiit",
          title: conditioningPlan.name,
          subtitle: hiitSets + " sets",
          summary: conditioningPlan.goal,
          hiitSets,
          conditioningPlan
        };
      }

      const recoveryDose = getRecoveryDayDose(band.key);
      return {
        dateKey,
        checkin,
        total,
        band,
        baseSessionType,
        effectiveSessionType: "recovery",
        title: recoveryDose.title,
        subtitle: recoveryDose.summary,
        summary: "Recovery day comes from your logbook; the score chooses the format.",
        recoveryDose
      };
    }

    function getExerciseRecord(exercise) {
      if (!state.records.exercises[exercise]) {
        state.records.exercises[exercise] = {
          lastValue: "",
          pendingNudge: null
        };
      }
      return state.records.exercises[exercise];
    }

    function buildPreviousText(lastValue, pendingNudge) {
      if (!lastValue) {
        return "";
      }
      if (pendingNudge === "up") {
        return "Last time: " + lastValue + " -- probeer iets zwaarder";
      }
      if (pendingNudge === "down") {
        return "Last time: " + lastValue + " -- probeer iets lichter";
      }
      return "Last time: " + lastValue;
    }

    function rotateIronFrameDay() {
      const day = IRON_FRAME_DAYS[state.rotations.mainOrderIndex % IRON_FRAME_DAYS.length];
      state.rotations.mainOrderIndex += 1;
      return day;
    }

    function createIronFrameSlot(template, index, phase) {
      const record = getExerciseRecord(template.exercise);
      const slot = {
        id: "iron-frame-" + index,
        slotType: template.block === "Primer" ? "primer" : "main",
        patternKey: template.block,
        label: template.block,
        subcategory: template.role || template.block,
        exercise: template.exercise,
        prescription: getPeriodizedPrescription(template, phase),
        basePrescription: template.prescription,
        guidance: template.guidance || "",
        previousText: buildPreviousText(record.lastValue, record.pendingNudge),
        inputValue: record.lastValue || "",
        nudgeChoice: null,
        setsDone: 0
      };
      record.pendingNudge = null;
      return slot;
    }

    function createIronFrameSlots(template, index, phase) {
      if (!template.ballisticSkill) {
        return [createIronFrameSlot(template, index, phase)];
      }

      const skillTemplate = {
        block: template.block,
        exercise: template.ballisticSkill,
        prescription: template.ballisticPrescription,
        role: "Technical ballistic skill",
        guidance: template.ballisticGuidance
      };

      return [
        createIronFrameSlot(skillTemplate, index + "-skill", phase),
        createIronFrameSlot(template, index, phase)
      ];
    }

    function ensureCurrentWorkout(plan) {
      if (!plan || plan.effectiveSessionType !== "strength") {
        return;
      }

      if (state.currentWorkout) {
        return;
      }

      const rotationSnapshot = cloneRotations(state.rotations);
      const programDay = rotateIronFrameDay();
      const periodization = getPeriodizationPhase();
      const slots = programDay.slots.flatMap((slot, index) => createIronFrameSlots(slot, index, periodization));

      state.currentWorkout = {
        id: "workout-" + Date.now(),
        planDate: plan.dateKey,
        generatedAt: new Date().toISOString(),
        rotationSnapshot,
        programDayKey: programDay.key,
        programDayTitle: programDay.title,
        focusNote: programDay.focus,
        tertiaryNote: programDay.tertiary,
        periodization,
        order: programDay.slots.map((slot) => slot.block),
        slots
      };
      saveState();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderFocusOfTheDay() {
      const focus = getTodayFocus();
      return `
        <article class="card soft focus-card">
          <p class="slot-kicker">Focus of the Day</p>
          <h3>${escapeHtml(focus.title)}</h3>
          <p class="subtle">${escapeHtml(focus.text)}</p>
        </article>
      `;
    }

    function formatDateTime(value) {
      try {
        return new Date(value).toLocaleString("nl-NL", {
          dateStyle: "medium",
          timeStyle: "short"
        });
      } catch (error) {
        return value;
      }
    }

    function getDateKeyFromValue(value) {
      const date = new Date(value);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return year + "-" + month + "-" + day;
    }

    function getLastLoggedItem() {
      return state.history[0] || null;
    }

    function isTodayClosed() {
      const lastItem = getLastLoggedItem();
      return !!(lastItem && getDateKeyFromValue(lastItem.completedAt) === getTodayKey());
    }

    function getCurrentHiitOption() {
      return formatHiitPlan(getCurrentHiitPlan());
    }

    function getCurrentHiitPlan() {
      const currentIndex = getCurrentConditioningCycleIndex();
      const plan = getCurrentConditioningCycle().hiit;
      const todayPlan = getTodayPlan();
      const targetSets = todayPlan.hiitSets || plan.sets;
      return {
        ...plan,
        optionIndex: currentIndex % CONDITIONING_CYCLES.length,
        mode: "full",
        targetSets
      };
    }

    function formatHiitPlan(plan) {
      return plan.name + ": " + plan.targetSets + " sets, " + plan.workSec + " sec work / " + plan.restSec + " sec rest, " + plan.totalDuration + " total intervals.";
    }

    function getHiitRestSeconds(plan) {
      return plan.restSec;
    }

    function advanceHiitRotation() {
      completeConditioningType("hiit");
    }

    function advanceZone2Rotation() {
      completeConditioningType("zone2");
    }

    function formatSeconds(totalSeconds) {
      const safeSeconds = Math.max(0, totalSeconds);
      const minutes = Math.floor(safeSeconds / 60);
      const seconds = safeSeconds % 60;
      return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
    }

    function getRestTimerKeys() {
      return Object.keys(state.timers || {});
    }

    function getTimerState(timerKey) {
      return state.timers[timerKey];
    }

    function getRemainingSeconds(timerKey) {
      const timer = getTimerState(timerKey);
      if (!timer.running || !timer.endTime) {
        return timer.lastDurationSec || 75;
      }
      const diffMs = timer.endTime - Date.now();
      return Math.max(0, Math.ceil(diffMs / 1000));
    }

    function syncTimerState() {
      getRestTimerKeys().forEach((timerKey) => {
        const timer = getTimerState(timerKey);
        if (!timer.running || !timer.endTime) {
          return;
        }
        if (Date.now() >= timer.endTime && !timer.beeped) {
          timer.beeped = true;
          timer.running = false;
          saveState();
          playBeep(1046);
        }
      });
      syncHiitTimerState();
      updateWakeLock();
    }

    function startRestTimer(timerKey, durationSec) {
      const timer = getTimerState(timerKey);
      timer.lastDurationSec = durationSec;
      timer.endTime = Date.now() + (durationSec * 1000);
      timer.running = true;
      timer.beeped = false;
      saveState();
      startTimerLoop();
      updateWakeLock();
      renderApp();
    }

    function stopRestTimer(timerKey) {
      const timer = getTimerState(timerKey);
      timer.running = false;
      timer.endTime = null;
      timer.beeped = false;
      saveState();
      updateWakeLock();
      renderApp();
    }

    function startTimerLoop() {
      if (timerIntervalId) {
        return;
      }
      timerIntervalId = window.setInterval(() => {
        syncTimerState();
        updateTimerDisplay();
      }, 250);
    }

    function updateTimerDisplay() {
      getRestTimerKeys().forEach((timerKey) => {
        const display = document.getElementById("timerDisplay-" + timerKey);
        if (display) {
          display.textContent = formatSeconds(getRemainingSeconds(timerKey));
        }
      });
      const hiitDisplay = document.getElementById("hiitTimerDisplay");
      if (hiitDisplay) {
        hiitDisplay.textContent = formatSeconds(getHiitRemainingSeconds());
      }
      const anyRunning = getRestTimerKeys().some((timerKey) => getTimerState(timerKey).running) || state.hiit.timer.running;
      if (!anyRunning && timerIntervalId) {
        window.clearInterval(timerIntervalId);
        timerIntervalId = null;
      }
      updateWakeLock();
    }

    function playBeep(frequency) {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          return;
        }
        const context = new AudioContextClass();
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.type = "sine";
        oscillator.frequency.value = frequency || 880;
        gain.gain.setValueAtTime(0.001, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.18, context.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + 0.55);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start();
        oscillator.stop(context.currentTime + 0.55);
      } catch (error) {
        console.warn("Beep kon niet worden afgespeeld.", error);
      }
    }

    function getHiitSessionKey(plan) {
      return plan.name;
    }

    function prepareHiitSession(plan) {
      const changedPlan = state.hiit.activeOptionIndex !== plan.optionIndex
        || state.hiit.activeMode !== plan.mode
        || state.hiit.activePlanName !== plan.name;
      if (changedPlan) {
        state.hiit.activeOptionIndex = plan.optionIndex;
        state.hiit.activePlanName = plan.name;
        state.hiit.activeMode = plan.mode;
        state.hiit.setsDone = 0;
        state.hiit.timer.running = false;
        state.hiit.timer.endTime = null;
        state.hiit.timer.phase = "idle";
        state.hiit.timer.beeped = false;
        saveState();
      }
    }

    function getHiitRemainingSeconds() {
      const timer = state.hiit.timer;
      if (!timer.running || !timer.endTime) {
        const plan = getCurrentHiitPlan(state.hiit.activeMode === "half");
        return timer.phase === "rest"
          ? getHiitRestSeconds(plan)
          : plan.workSec;
      }
      return Math.max(0, Math.ceil((timer.endTime - Date.now()) / 1000));
    }

    function syncHiitTimerState() {
      const timer = state.hiit.timer;
      if (!timer.running || !timer.endTime || Date.now() < timer.endTime || timer.beeped) {
        return;
      }

      const plan = getCurrentHiitPlan(state.hiit.activeMode === "half");
      timer.beeped = true;
      playBeep(timer.phase === "work" ? 1175 : 880);

      if (timer.phase === "work") {
        state.hiit.setsDone = Math.min(plan.targetSets, (state.hiit.setsDone || 0) + 1);
        if (state.hiit.setsDone >= plan.targetSets) {
          timer.phase = "done";
          timer.running = false;
          timer.endTime = null;
        } else {
          timer.phase = "rest";
          timer.running = true;
          timer.endTime = Date.now() + (getHiitRestSeconds(plan) * 1000);
          timer.beeped = false;
        }
      } else {
        timer.phase = "idle";
        timer.running = false;
        timer.endTime = null;
      }
      saveState();
      renderApp();
    }

    function startHiitPhase(phase) {
      const plan = getCurrentHiitPlan(state.hiit.activeMode === "half");
      if (state.hiit.setsDone >= plan.targetSets && phase === "work") {
        state.hiit.setsDone = 0;
      }
      state.hiit.timer.phase = phase;
      state.hiit.timer.endTime = Date.now() + ((phase === "rest" ? getHiitRestSeconds(plan) : plan.workSec) * 1000);
      state.hiit.timer.running = true;
      state.hiit.timer.beeped = false;
      saveState();
      startTimerLoop();
      updateWakeLock();
      renderApp();
    }

    function completeHiitRound() {
      const plan = getCurrentHiitPlan();
      if (state.hiit.timer.running || state.hiit.setsDone >= plan.targetSets) {
        return;
      }
      state.hiit.setsDone += 1;
      state.hiit.timer.beeped = false;
      if (state.hiit.setsDone >= plan.targetSets) {
        state.hiit.timer.phase = "done";
        state.hiit.timer.endTime = null;
        state.hiit.timer.running = false;
      } else {
        state.hiit.timer.phase = "rest";
        state.hiit.timer.endTime = Date.now() + (getHiitRestSeconds(plan) * 1000);
        state.hiit.timer.running = true;
        startTimerLoop();
      }
      saveState();
      updateWakeLock();
      renderApp();
    }

    function stopHiitTimer() {
      state.hiit.timer.running = false;
      state.hiit.timer.endTime = null;
      state.hiit.timer.phase = "idle";
      state.hiit.timer.beeped = false;
      saveState();
      updateWakeLock();
      renderApp();
    }

    function resetHiitSets() {
      state.hiit.setsDone = 0;
      state.hiit.timer.running = false;
      state.hiit.timer.endTime = null;
      state.hiit.timer.phase = "idle";
      state.hiit.timer.beeped = false;
      saveState();
      updateWakeLock();
      renderApp();
    }

    function updateHiitWeight(value) {
      const plan = getCurrentHiitPlan(state.hiit.activeMode === "half");
      state.hiit.weights[getHiitSessionKey(plan)] = value;
      saveState();
    }

    function updateZone2Modality(value) {
      if (!ZONE2_PLAN.modalities.includes(value)) {
        return;
      }
      state.zone2.modality = value;
      saveState();
      renderApp();
    }

    function updateHiitHeartRate(key, value) {
      const fallback = key === "heartRateMin" ? 143 : 173;
      const nextValue = Math.max(60, Math.min(240, Number(value) || fallback));
      state.hiit[key] = nextValue;
      if (state.hiit.heartRateMin >= state.hiit.heartRateMax) {
        state.hiit.heartRateMin = 143;
        state.hiit.heartRateMax = 173;
      }
      saveState();
      renderApp();
    }

    function anyTimerRunning() {
      return getRestTimerKeys().some((timerKey) => getTimerState(timerKey).running) || state.hiit.timer.running;
    }

    async function requestWakeLock() {
      if (wakeLock || !("wakeLock" in navigator) || document.visibilityState !== "visible") {
        return;
      }
      try {
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => {
          wakeLock = null;
        });
      } catch (error) {
        wakeLock = null;
      }
    }

    async function releaseWakeLock() {
      if (!wakeLock) {
        return;
      }
      try {
        await wakeLock.release();
      } catch (error) {
        wakeLock = null;
      }
    }

    function updateWakeLock() {
      if (anyTimerRunning()) {
        requestWakeLock();
      } else {
        releaseWakeLock();
      }
    }

    function renderRecoveryGate(plan) {
      const draft = getTodayRecoveryCheckin() || createDefaultRecoveryCheckin();
      const draftTotal = getRecoveryTotal(draft);
      const draftBand = getRecoveryBand(draftTotal);
      const sliderRows = RECOVERY_FIELDS.map((field) => `
        <label class="mini-card recovery-slider-card" style="display:grid;">
          <div class="recovery-slider-head">
            <strong>${escapeHtml(field.label)}</strong>
            <span class="recovery-slider-value" id="recoveryValue-${escapeHtml(field.key)}">${escapeHtml(draft[field.key] || 3)}</span>
          </div>
          <input
            type="range"
            min="1"
            max="5"
            step="1"
            value="${escapeHtml(draft[field.key] || 3)}"
            data-action="recovery-slider"
            data-key="${escapeHtml(field.key)}"
          >
        </label>
      `).join("");

      return `
        <article class="card action-card">
          <div class="card-header">
            <div>
              <p class="action-kicker">Start here</p>
              <h3>Recovery screen</h3>
              <p class="subtle">Score recovery first, then Iron Frame shows your session.</p>
            </div>
            <div class="slot-chip">Score 1-5</div>
          </div>
          <div class="stats-grid">
            ${sliderRows}
          </div>
          <div class="score-panel">
            <div class="overview-card">
              <span class="overview-label">Recovery total</span>
              <span class="overview-value" id="recoveryTotalValue">${escapeHtml(draftTotal)}/15</span>
            </div>
            <div class="overview-card">
              <span class="overview-label">Band</span>
              <span class="overview-value" id="recoveryBandValue">${escapeHtml(draftBand.label)}</span>
            </div>
          </div>
          <div class="button-row" style="margin-top:16px;">
            <button class="primary-button" type="button" id="startSessionButton">Show today's session</button>
          </div>
        </article>
      `;
    }

    function renderRecoverySnapshot(plan) {
      return `
        <article class="card soft">
          <div class="card-header">
            <div>
              <h3>Recovery score</h3>
              <p class="subtle">${escapeHtml(plan.band.label)} - ${plan.total}/15</p>
            </div>
            <button class="ghost-button" type="button" id="editRecoveryButton">Edit score</button>
          </div>
          <div class="day-badges">
            ${RECOVERY_FIELDS.map((field) => `<div class="badge">${escapeHtml(field.label)}: ${escapeHtml(plan.checkin[field.key])}</div>`).join("")}
          </div>
        </article>
      `;
    }

    function renderFinishedState() {
      const lastItem = getLastLoggedItem();
      const summary = lastItem
        ? (lastItem.type === "skip"
          ? "Today's session has been skipped."
          : "Today's session has been logged.")
        : "Today's work is done.";

      return `
        <article class="card action-card finished-card">
          <div class="finished-mark">OK</div>
          <div class="card-header">
            <div>
              <p class="action-kicker">Closed for today</p>
              <h3>Finished for today</h3>
              <p class="subtle">Iron Frame unlocks the next session when it is a new day.</p>
            </div>
            <div class="slot-chip">Closed</div>
          </div>
          <div class="action-value">Today's work is done.</div>
          <p class="action-support">${escapeHtml(summary)}</p>
          ${lastItem ? `<p class="subtle">Last log: ${escapeHtml(lastItem.title)} - ${escapeHtml(formatDateTime(lastItem.completedAt))}</p>` : ""}
        </article>
      `;
    }

    function renderToday() {
      const view = document.getElementById("todayView");
      if (isTodayClosed()) {
        view.innerHTML = `
          <div class="stack">
            ${renderFocusOfTheDay()}
            ${renderFinishedState()}
          </div>
        `;
        return;
      }

      const plan = getTodayPlan();
      ensureCurrentWorkout(plan);

      if (plan.pendingCheckin) {
        view.innerHTML = `
          <div class="stack">
            ${renderFocusOfTheDay()}
            ${renderRecoveryGate(plan)}
          </div>
        `;
        bindRecoveryGateControls();
        return;
      }

      if (plan.effectiveSessionType !== "strength") {
        const actionValue = plan.effectiveSessionType === "zone2"
          ? plan.zone2Minutes + " minutes"
          : plan.effectiveSessionType === "hiit"
            ? getCurrentHiitOption()
            : plan.title;
        const conditioningHtml = plan.effectiveSessionType === "hiit"
          ? renderHiitCard()
          : plan.effectiveSessionType === "zone2"
            ? renderZone2Card(plan.conditioningPlan)
            : "";

        view.innerHTML = `
          <div class="stack">
            ${renderFocusOfTheDay()}
            ${renderRecoverySnapshot(plan)}
            <article class="card action-card">
              <div class="card-header">
                <div>
                  <p class="action-kicker">Today's session</p>
                  <h3>${escapeHtml(plan.title)}</h3>
                  <p class="subtle">${escapeHtml(plan.subtitle)}</p>
                </div>
                <div class="slot-chip">${escapeHtml(SESSION_LABELS[plan.effectiveSessionType])}</div>
              </div>
              <div class="action-value">${escapeHtml(actionValue)}</div>
              ${conditioningHtml}
              ${renderRecoveryGuidance(plan)}
              <div class="button-row">
                <button class="primary-button" type="button" id="finishRecoveryButton">Complete session</button>
                <button class="secondary-button" type="button" id="skipDayButton">Skip</button>
              </div>
            </article>
          </div>
        `;
        bindWorkoutControls();
        document.getElementById("finishRecoveryButton").addEventListener("click", handleFinishRecoveryDay);
        document.getElementById("skipDayButton").addEventListener("click", handleSkipDay);
        const editButton = document.getElementById("editRecoveryButton");
        if (editButton) {
          editButton.addEventListener("click", handleEditRecoveryCheckin);
        }
        return;
      }

      const workout = state.currentWorkout;
      const periodization = workout.periodization || getPeriodizationPhase();
      const groupsHtml = renderTrainingGroups(workout, plan);
      const warmupHtml = renderWarmupAccordion();
      const cooldownHtml = renderCooldownAccordion();
      const carryOverNote = workout.planDate && workout.planDate !== getTodayKey()
        ? `<p class="muted-note">You are continuing an open strength session from ${escapeHtml(workout.planDate)}. The exercise order stays the same until you complete or skip it.</p>`
        : "";
      const modeNote = "";

      view.innerHTML = `
        <div class="stack">
          ${renderFocusOfTheDay()}
          ${renderRecoverySnapshot(plan)}
          ${warmupHtml}
          <article class="card">
            <div class="card-header">
              <div>
                <p class="action-kicker">Today's session</p>
                <h3>${escapeHtml(workout.programDayTitle || "Iron Frame")}</h3>
                <p class="subtle">${escapeHtml(workout.focusNote || "Fixed strength session.")}</p>
              </div>
              <div class="slot-chip">${escapeHtml(periodization.label)} ${periodization.phaseSessionNumber}/${periodization.sessionCount}</div>
            </div>
            ${groupsHtml}
            ${carryOverNote}
            ${modeNote}
            ${cooldownHtml}
            <div class="button-row">
              <button class="primary-button" type="button" id="finishWorkoutButton">Complete session</button>
              <button class="secondary-button" type="button" id="skipDayButton">Skip</button>
            </div>
          </article>
        </div>
      `;

      bindWorkoutControls();
      document.getElementById("skipDayButton").addEventListener("click", handleSkipDay);
      document.getElementById("editRecoveryButton").addEventListener("click", handleEditRecoveryCheckin);
    }

    function renderTrainingGroups(workout, plan) {
      const periodization = workout.periodization || getPeriodizationPhase();
      const primerSlots = workout.slots.filter((slot) => slot.label === "Primer");
      const slotByBlock = (block) => workout.slots.filter((slot) => slot.label === block);
      const groups = [
        { id: "primer", title: "Primer", subtitle: "Loaded mobility / core / skill", slots: primerSlots, timer: false },
        { id: "groupA", title: "A Block", subtitle: "Focus main lift + wederpatroon", slots: [...slotByBlock("A1"), ...slotByBlock("A2")], timer: true },
        { id: "groupB", title: "B Block", subtitle: "Ontbrekende twee patronen", slots: [...slotByBlock("B1"), ...slotByBlock("B2")], timer: true },
        { id: "groupC", title: "C Block", subtitle: "Specialized variety + tertiaire oefening", slots: [...slotByBlock("C1"), ...slotByBlock("C2")], timer: true }
      ];

      return `
        <div class="group-grid">
          <article class="card soft focus-card">
            <p class="slot-kicker">${escapeHtml(periodization.label)} - ronde ${Math.floor(periodization.phaseSessionIndex / IRON_FRAME_DAYS.length) + 1} van 4</p>
            <h3>${escapeHtml(workout.programDayTitle || "Iron Frame Focus")}</h3>
            <p class="subtle">${escapeHtml(workout.focusNote || "")}</p>
            <p class="subtle">${escapeHtml(workout.tertiaryNote || "")}</p>
            <p class="muted-note">${escapeHtml(periodization.summary)} Sessie ${periodization.phaseSessionNumber} van ${periodization.sessionCount} in deze fase.</p>
            <p class="muted-note">${escapeHtml(periodization.guidance || "")}</p>
          </article>
          ${groups.filter((group) => group.slots.length).map((group) => renderExerciseGroup(group)).join("")}
        </div>
      `;
    }

    function renderExerciseGroup(group) {
      return `
        <section class="exercise-group">
          <div class="group-heading">
            <div>
              <h4>${escapeHtml(group.title)}</h4>
              <p class="subtle">${escapeHtml(group.subtitle)}</p>
            </div>
            <div class="slot-chip">${group.slots.length} exercises</div>
          </div>
          <div class="group-slots">
            ${group.slots.map((slot) => renderSlot(slot)).join("")}
          </div>
          ${group.timer === false ? "" : renderGroupTimer(group.id)}
        </section>
      `;
    }

    function renderGroupTimer(timerKey) {

      return `
        <div class="mini-card">
          <div class="timer-row centered">
            <div>
              <div class="slot-kicker">Rest between these exercises</div>

            </div>
          </div>
          <div class="timer-options">
            ${GROUP_REST_OPTIONS.map((seconds) => `
              <button class="primary-button" type="button" data-action="group-timer-start" data-timer-key="${escapeHtml(timerKey)}" data-duration="${seconds}">
                ${timer.running && timer.lastDurationSec === seconds ? "Restart" : "Start"} ${formatSeconds(seconds)}

          </div>
        </div>
      `;
    }

              <button class="nudge-button ${slot.nudgeChoice === "up" ? "active-up" : ""}" type="button" data-action="nudge" data-slot-id="${escapeHtml(slot.id)}" data-direction="up" aria-label="A little heavier next time">+</button>

        <article class="slot-card">
          <div class="slot-top">
            <div>
              <p class="slot-kicker">${escapeHtml(slot.label)}</p>
              <h4 class="slot-title">${escapeHtml(slot.exercise || slot.subcategory)}</h4>
              ${exerciseMarkup}

    function renderWarmupAccordion() {
      return `
        <article class="card soft">
          <details class="accordion">
            <summary>Warm-up</summary>

    function renderRecoveryGuidance(plan) {
      let sections = [];
      let summaryLabel = "Guidelines";

      if (plan.effectiveSessionType === "breatheRest") {
        sections = [
          { heading: "Today", items: ["Breathing.", "Rest.", "Optionally take an easy walk if that naturally feels good."] }
        ];
      } else if (plan.effectiveSessionType === "zone2") {
        sections = [
          {
            heading: "Zone 2 rule",
            items: [
              "Keep the movement rhythmic, smooth and sustainable for the full 30-45 minutes.",
              "Avoid local muscular burn, grip fatigue, heavy bracing and breathlessness."
            ]
          }
        ];
      } else if (plan.effectiveSessionType === "hiit") {
        sections = [
          {
            heading: "HIIT rule",
            items: [
              "The timer drives the session; heart rate validates the load and pace.",
              "The first rounds may stay below the lower limit, but heart rate should gradually enter the personal frame.",
              "If heart rate remains below the lower limit, increase the load or pace next time.",
              "Stop the interval block above the upper limit. Technique loss always ends a set earlier."
            ]
          }
        ];
      } else if (plan.effectiveSessionType === "recovery") {
        summaryLabel = "Recovery day";
        const recoveryContent = plan.band.key === "high"
          ? RECOVERY_CONTENT[7]
          : plan.band.key === "medium"
            ? RECOVERY_CONTENT[4]
            : null;
        sections = recoveryContent
          ? recoveryContent.sections
          : [{ heading: plan.recoveryDose.title, items: plan.recoveryDose.guidance }];
      }

      const sectionsHtml = sections.map((section) => `
        <div class="mini-card" style="margin-top: 12px;">
          <h4>${escapeHtml(section.heading)}</h4>
          <ul class="detail-list">
            ${section.items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
        </div>
      `).join("");

      return `
        <details class="accordion" style="margin-top: 16px;">
          <summary>${escapeHtml(summaryLabel)}</summary>
          <div class="accordion-body">
            ${sectionsHtml}
          </div>
        </details>
      `;

    function bindWorkoutControls() {
      bindTimerControls();

      document.querySelectorAll('[data-action="slot-input"]').forEach((input) => {
        input.addEventListener("input", (event) => {
          const slotId = event.target.getAttribute("data-slot-id");
          const slot = findWorkoutSlot(slotId);
          if (!slot) {
            return;
          }
          slot.inputValue = event.target.value;
          saveState();
        });
      });

      document.querySelectorAll('[data-action="nudge"]').forEach((button) => {
        button.addEventListener("click", () => {
          const slotId = button.getAttribute("data-slot-id");
          const direction = button.getAttribute("data-direction");
          const slot = findWorkoutSlot(slotId);
          if (!slot) {
            return;
          }
          slot.nudgeChoice = slot.nudgeChoice === direction ? null : direction;
          saveState();
          renderToday();
        });
      });

      document.querySelectorAll('[data-action="set-adjust"]').forEach((button) => {
        button.addEventListener("click", () => {
          const slotId = button.getAttribute("data-slot-id");
          const delta = Number(button.getAttribute("data-delta"));
          const slot = findWorkoutSlot(slotId);
          if (!slot) {
            return;
          }
          slot.setsDone = Math.max(0, (Number(slot.setsDone) || 0) + delta);
          saveState();
          renderToday();
        });
      });

      const finishButton = document.getElementById("finishWorkoutButton");
      if (finishButton) {
        finishButton.addEventListener("click", handleFinishWorkout);
      }
    }

    function bindRecoveryGateControls() {
      document.querySelectorAll('[data-action="recovery-slider"]').forEach((input) => {
        input.addEventListener("input", (event) => {
          const key = event.target.getAttribute("data-key");
          const value = Number(event.target.value);
          const draft = {
            ...createDefaultRecoveryCheckin(),
            ...(getTodayRecoveryCheckin() || {})
          };
          draft[key] = value;
          state.recoveryCheckins[getTodayKey()] = draft;
          const label = document.getElementById("recoveryValue-" + key);
          if (label) {
            label.textContent = value;
          }
          const total = getRecoveryTotal(draft);
          const band = getRecoveryBand(total);
          const totalLabel = document.getElementById("recoveryTotalValue");
          const bandLabel = document.getElementById("recoveryBandValue");
          if (totalLabel) {
            totalLabel.textContent = total + "/15";
          }
          if (bandLabel) {
            bandLabel.textContent = band.label;
          }
          saveState();
        });
      });

      const startButton = document.getElementById("startSessionButton");
      if (startButton) {
        startButton.addEventListener("click", () => {
          const draft = {
            ...createDefaultRecoveryCheckin(),
            ...(getTodayRecoveryCheckin() || {})
          };
          draft.submittedAt = new Date().toISOString();
          state.recoveryCheckins[getTodayKey()] = draft;
          saveState();
          renderApp();
          switchTab(TABS.TODAY);
        });
      }
    }

    function bindTimerControls() {
      document.querySelectorAll('[data-action="group-timer-start"]').forEach((button) => {
        button.addEventListener("click", () => {
          startRestTimer(button.getAttribute("data-timer-key"), Number(button.getAttribute("data-duration")));
        });
      });

      document.querySelectorAll('[data-action="group-timer-stop"]').forEach((button) => {
        button.addEventListener("click", () => stopRestTimer(button.getAttribute("data-timer-key")));
      });

      const hiitWeightInput = document.querySelector('[data-action="hiit-weight"]');
      if (hiitWeightInput) {
        hiitWeightInput.addEventListener("input", (event) => updateHiitWeight(event.target.value));
      }

      document.querySelectorAll('[data-action="zone2-modality"]').forEach((button) => {
        button.addEventListener("click", () => updateZone2Modality(button.getAttribute("data-modality")));
      });

      document.querySelectorAll('[data-action="hiit-heart-rate"]').forEach((input) => {
        input.addEventListener("change", (event) => {
          updateHiitHeartRate(event.target.getAttribute("data-heart-rate-key"), event.target.value);
        });
      });

      const hiitStartButton = document.querySelector('[data-action="hiit-start"]');
      if (hiitStartButton) {
        hiitStartButton.addEventListener("click", () => startHiitPhase("work"));
      }

      const hiitStopButton = document.querySelector('[data-action="hiit-stop"]');
      if (hiitStopButton) {
        hiitStopButton.addEventListener("click", stopHiitTimer);

      if (hiitResetButton) {
        hiitResetButton.addEventListener("click", resetHiitSets);
      }
    }

    function findWorkoutSlot(slotId) {
      if (!state.currentWorkout) {
        return null;
      }
      return state.currentWorkout.slots.find((slot) => slot.id === slotId) || null;
    }

    function handleEditRecoveryCheckin() {
      const todayKey = getTodayKey();
      const current = state.recoveryCheckins[todayKey];
      if (!current) {
        renderApp();
        return;
      }
      state.recoveryCheckins[todayKey] = {
        ...current,
        submittedAt: null
      };
      saveState();
      renderApp();
      switchTab(TABS.TODAY);
    }

    function handleFinishWorkout() {
      if (!state.currentWorkout) {
        return;
      }

      const todayPlan = getTodayPlan();
      const workout = state.currentWorkout;
      workout.slots.forEach((slot) => {
        if (slot.exercise) {
          const record = getExerciseRecord(slot.exercise);
          if (slot.inputValue && slot.inputValue.trim()) {
            record.lastValue = slot.inputValue.trim();
          }
          record.pendingNudge = slot.nudgeChoice || null;
        }
      });

      state.history.unshift({
        id: "history-" + Date.now(),
        type: "training",
        sessionType: "strength",
        title: workout.programDayTitle || "Iron Frame",
        completedAt: new Date().toISOString(),
        recoveryBand: todayPlan.band ? todayPlan.band.label : "",
        recoveryTotal: todayPlan.total || null,
        periodization: workout.periodization || getPeriodizationPhase(),
        slots: workout.slots.map((slot) => ({
          label: slot.label,
          subcategory: slot.subcategory,
          exercise: slot.exercise,
          prescription: slot.prescription || "",
          value: slot.inputValue || ""
        }))
      });

      state.trainingSessionsCompleted += 1;
      if (!state.periodization || state.periodization.mode === "auto") {
        state.periodization = state.periodization || { mode: "auto", autoCompletedStrengthSessions: 0 };
        state.periodization.autoCompletedStrengthSessions += 1;
      }
      state.currentWorkout = null;
      saveState();
      launchConfetti();
      renderApp();
      switchTab(TABS.TODAY);
    }

    function handleSkipDay() {
      const todayPlan = getTodayPlan();
      if (state.currentWorkout && state.currentWorkout.rotationSnapshot) {
        state.rotations = cloneRotations(state.currentWorkout.rotationSnapshot);
      }
      state.history.unshift({
        id: "history-" + Date.now(),
        type: "skip",
        sessionType: todayPlan.effectiveSessionType || todayPlan.baseSessionType,
        title: todayPlan.title || "Session skipped",
        completedAt: new Date().toISOString(),
        recoveryBand: todayPlan.band ? todayPlan.band.label : "",
        recoveryTotal: todayPlan.total || null,
        slots: []
      });

      state.currentWorkout = null;
      saveState();
      renderApp();
      switchTab(TABS.TODAY);
    }

    function handleFinishRecoveryDay() {
      const todayPlan = getTodayPlan();
      const hiitPlan = todayPlan.effectiveSessionType === "hiit" ? getCurrentHiitPlan() : null;
      const zone2Plan = todayPlan.effectiveSessionType === "zone2" ? todayPlan.conditioningPlan : null;
      if (hiitPlan) {
        advanceHiitRotation();
      }
      if (zone2Plan) {
        advanceZone2Rotation();
      }
      state.history.unshift({
        id: "history-" + Date.now(),
        type: "recovery-finish",
        sessionType: todayPlan.effectiveSessionType,
        title: todayPlan.title,
        completedAt: new Date().toISOString(),
        recoveryBand: todayPlan.band ? todayPlan.band.label : "",
        recoveryTotal: todayPlan.total || null,
        hiitFinisher: hiitPlan ? formatHiitPlan(hiitPlan) : null,
        conditioningSummary: hiitPlan
          ? formatHiitPlan(hiitPlan)
          : zone2Plan
            ? zone2Plan.selectedModality + ": " + zone2Plan.minutes + " minutes - " + zone2Plan.format.join(" - ") + "."
            : null,
        hiitWeight: hiitPlan ? (state.hiit.weights[getHiitSessionKey(hiitPlan)] || "") : "",
        hiitSetsDone: hiitPlan ? (state.hiit.setsDone || 0) : 0,
        slots: []
      });

      state.currentWorkout = null;
      saveState();
      launchConfetti();
      renderApp();
      switchTab(TABS.TODAY);
    }
